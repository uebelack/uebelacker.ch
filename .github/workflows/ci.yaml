name: "Continuous Integration"
on:
  pull_request:
    branches: '*'

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Test and Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install
      - name: Lint code
        run: bun lint
      - name: Run Tests
        run: bun test
